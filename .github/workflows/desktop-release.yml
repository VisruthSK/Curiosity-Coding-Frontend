name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            assetName: macOS-Intel

          - platform: macos-15
            args: --target aarch64-apple-darwin
            assetName: macOS-Apple-Silicon

          - platform: windows-latest
            args: ""
            assetName: Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop-test-{0}', github.run_number) }}
          releaseName: Curiosity Coding Interface ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('desktop test {0}', github.run_number) }}
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          releaseAssetNamePattern: Curiosity-Coding-Interface-${{ matrix.assetName }}-v[version][ext]
          args: ${{ matrix.args }}

